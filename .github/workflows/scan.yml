name: Strategic Copilot Daily Scan

on:
  schedule:
    - cron: '23 11 * * 1-5'  # 11:23 AM UTC (7:23 AM Eastern), Monday–Friday
  workflow_dispatch:          # Manual trigger via GitHub Actions tab

permissions:
  contents: write             # allow the workflow to commit results back to the repo

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/main.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Daily scan results ($(date -u +%Y-%m-%d))"
          git push
