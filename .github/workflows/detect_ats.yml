name: Detect Company ATS

on:
  workflow_dispatch:

permissions:
  contents: write   # commit config/companies.yml back to the repo

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Detect ATS handles
        run: python src/detect_ats.py
      - name: Commit companies config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/companies.yml
          git diff --cached --quiet || git commit -m "Detect ATS handles"
          git push
