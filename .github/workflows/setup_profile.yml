name: Build Scoring Profile

on:
  workflow_dispatch:

permissions:
  contents: write   # commit config/profile.yml back to the repo

jobs:
  build-profile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Build scoring profile
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/setup_profile.py
      - name: Commit profile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/profile.yml
          git diff --cached --quiet || git commit -m "Build scoring profile"
          git push
